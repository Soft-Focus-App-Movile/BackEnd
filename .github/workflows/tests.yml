name: Run Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore SoftFocusBackend.Tests/SoftFocusBackend.Tests.csproj

      - name: Build test project
        run: dotnet build SoftFocusBackend.Tests/SoftFocusBackend.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test SoftFocusBackend.Tests/SoftFocusBackend.Tests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/test-results.trx'
          retention-days: 7